<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Glow Ring (Subtle) -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3" filter="url(#glow)" />

  <!-- Shield Base -->
  <path d="M64,12 C90,12 108,22 108,46 C108,76 84,102 64,116 C44,102 20,76 20,46 C20,22 38,12 64,12 Z" 
        fill="url(#shieldGrad)" 
        stroke="#ffffff" 
        stroke-width="3" 
        filter="drop-shadow(0px 8px 16px rgba(79, 70, 229, 0.4))" />

  <!-- Shield Inner Layer (Darker Depth) -->
  <path d="M64,20 C85,20 98,28 98,48 C98,72 78,94 64,106 C50,94 30,72 30,48 C30,28 43,20 64,20 Z" 
        fill="#0f172a" 
        opacity="0.9" />

  <!-- Lock / Shield Center Symbol -->
  <g transform="translate(44, 44)">
    <!-- Shield checkmark/symbol path -->
    <path d="M20,6 L8,18 L2,12 M8,18 L32,6" 
          fill="none" 
          stroke="url(#accentGrad)" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glow)" />
  </g>

  <!-- Premium Overlay Lines -->
  <path d="M64,20 L64,106" stroke="#ffffff" stroke-width="1.5" opacity="0.1" stroke-dasharray="4 4" />
</svg>
